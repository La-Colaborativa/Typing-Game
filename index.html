<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles-esol.css">
  <link rel="icon" href="images/LC.png" type="image/png">
  <title>LC | Activities</title>
</head>
<body>
  <img src="./images/LaColaborativa-logo.png" class="main-logo" alt="La Colaborativa logo">
  <hr>

  <div class="parent">
    <div class="div1">
      <a href="index-esol.html" class="image-button">
        <img src="./images/esol-screenshot.png" alt="ESOL Page">
      </a>
    </div>

    <div class="div2">
      <a href="index-typing.html" class="image-button">
        <img src="./images/window-screenshot.png" alt="Window Page">
      </a>
    </div>

    <div class="div3">
      <a href="index-esol.html" class="full-button">ESOL</a>
    </div>

    <div class="div4">
      <a href="index-typing.html" class="full-button">Typing</a>
    </div>
  </div>

  <style>
    .parent {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: auto auto;
      gap: 20px;
    }

    .div1 { grid-area: 1 / 1 / 2 / 2; }
    .div2 { grid-area: 1 / 2 / 2 / 3; }
    .div3 { grid-area: 2 / 1 / 3 / 2; }
    .div4 { grid-area: 2 / 2 / 3 / 3; }

    .main-logo {
      display: block;
      margin-left: auto;
      margin-right: auto;
      width: 35%;
    }

    .image-button {
      display: block;
    }

    .image-button img {
      display: block;
      width: 100%;
      height: auto;
      border: 3px solid white;
      border-radius: 10px;
    }

    .image-button:hover img {
      filter: brightness(1.08);
    }

    .full-button {
      display: block;
      width: 100%;
      padding: 14px 20px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 10px;
      background: rgba(39, 185, 230, 0.22);
      border: 2px solid rgba(39, 185, 230, 0.35);
      box-sizing: border-box;
    }

    hr {
      margin-top: 20px;
      margin-bottom: 40px;
      border: none;
      height: 3px;
      background-color: #FF7000;
    }
  </style>
</body>
</html>
